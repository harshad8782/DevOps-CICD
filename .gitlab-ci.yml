# .gitlab-ci.yml
# GitLab CI equivalent of the GitHub Actions pipeline
# Same stages, different syntax

stages:
  - build
  - test
  - quality
  - security
  - docker
  - deploy

variables:
  DOCKER_IMAGE: harshad8782/devops-demo
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository

# ── Build ──────────────────────────────

maven-build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

# ── Test ──────────────────────────────

unit-tests:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn test
  artifacts:
    reports:
      junit: target/surefire-reports/*.xml
    expire_in: 1 week

code-coverage:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn jacoco:report
  artifacts:
    paths:
      - target/site/jacoco/
    expire_in: 1 week
  coverage: '/Total.*?([0-9]{1,3})%/'

# ── Quality ───────────────────────────

sonarcloud-scan:
  stage: quality
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn sonar:sonar
      -Dsonar.projectKey=harshad8782_DevOps-CICD
      -Dsonar.organization=harshad8782
      -Dsonar.host.url=https://sonarcloud.io
      -Dsonar.token=$SONAR_TOKEN
  only:
    - main

# ── Security ──────────────────────────

trivy-scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy image --severity CRITICAL,HIGH $DOCKER_IMAGE:latest
  allow_failure: true

# ── Docker ────────────────────────────

docker-build-push:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
    - docker build -t $DOCKER_IMAGE:$CI_PIPELINE_IID .
    - docker build -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_PIPELINE_IID
    - docker push $DOCKER_IMAGE:latest
  only:
    - main

# ── Deploy ────────────────────────────

deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
  script:
    - ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "
        docker pull $DOCKER_IMAGE:latest &&
        docker stop devops-app || true &&
        docker rm devops-app || true &&
        docker run -d
          --name devops-app
          -p 8080:8080
          --restart unless-stopped
          $DOCKER_IMAGE:latest
      "
  only:
    - main
  environment:
    name: productions