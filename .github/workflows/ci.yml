name: CI — Build, Test, Quality, Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build → Test → Quality → Security → Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write        # needed for OIDC / aws-actions

    outputs:
      image_version: ${{ steps.version.outputs.VERSION }}
      ecr_image:     ${{ steps.version.outputs.ECR_IMAGE }}

    steps:

      # ─────────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # SonarCloud needs full history

      # ─────────────────────────────────────────────────
      # 2. Java
      # ─────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ─────────────────────────────────────────────────
      # 3. Build
      # ─────────────────────────────────────────────────
      - name: Build Maven Project
        run: mvn clean package -DskipTests

      # ─────────────────────────────────────────────────
      # 4. Unit Tests
      # ─────────────────────────────────────────────────
      - name: Run Unit Tests
        run: mvn test

      - name: Publish JUnit Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JUnit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # ─────────────────────────────────────────────────
      # 5. Code Coverage — JaCoCo
      # ─────────────────────────────────────────────────
      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # ─────────────────────────────────────────────────
      # 6. Code Quality Gate — SonarCloud
      # ─────────────────────────────────────────────────
      - name: SonarCloud Scan
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

      # ─────────────────────────────────────────────────
      # 7. Authenticate to AWS
      # ─────────────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ─────────────────────────────────────────────────
      # 8. Login to ECR
      # ─────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      # ─────────────────────────────────────────────────
      # 9. Set versioned image tag
      # ─────────────────────────────────────────────────
      - name: Set Version Tag
        id: version
        run: |
          VERSION="v1.${{ github.run_number }}.0"
          ECR_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${VERSION}"
          echo "VERSION=${VERSION}"   >> $GITHUB_OUTPUT
          echo "ECR_IMAGE=${ECR_IMAGE}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}"   >> $GITHUB_ENV
          echo "ECR_IMAGE=${ECR_IMAGE}" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────
      # 10. Build Docker Image (both versioned + latest)
      # ─────────────────────────────────────────────────
      - name: Build Docker Image
        run: |
          ECR_BASE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}"
          docker build -t "${ECR_BASE}:${VERSION}" .
          docker tag  "${ECR_BASE}:${VERSION}" "${ECR_BASE}:latest"

      # ─────────────────────────────────────────────────
      # 11. Security Scan — Trivy
      # ─────────────────────────────────────────────────
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest"
          format:    table
          exit-code: 0
          severity:  CRITICAL,HIGH
          output:    trivy-report.txt

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 7

      # ─────────────────────────────────────────────────
      # 12. Push to ECR
      # ─────────────────────────────────────────────────
      - name: Push Docker Image to ECR
        run: |
          ECR_BASE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}"
          docker push "${ECR_BASE}:${VERSION}"
          docker push "${ECR_BASE}:latest"
          echo ""
          echo "✅ Image pushed successfully"
          echo "📦 Version : ${VERSION}"
          echo "📦 Latest  : ${ECR_BASE}:latest"