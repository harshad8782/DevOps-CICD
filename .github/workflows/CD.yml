name: CD — Deploy to EC2

on:
  workflow_run:
    workflows: ["CI — Build, Test, Quality, Push to ECR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy → Health Check → Log Analysis → Email
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      EC2_IP:         ${{ secrets.EC2_HOST }}
      CONTAINER_NAME: devops-app
      APP_PORT:       "8081"
      CONTAINER_PORT: "8080"
      ECR_BASE:       "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}"
      ALERT_EMAIL:    ${{ secrets.ALERT_EMAIL }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ─────────────────────────────────────────────────
      # Write SSH key from GitHub Secret
      # No more Terraform needed — key stored as secret
      # ─────────────────────────────────────────────────
      - name: Write PEM Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/devops-demo-keypair.pem
          chmod 400 /tmp/devops-demo-keypair.pem
          echo "✅ PEM key ready"

      # ─────────────────────────────────────────────────
      # Get latest image version from ECR
      # ─────────────────────────────────────────────────
      - name: Get Latest Image Tag from ECR
        run: |
          VERSION=$(aws ecr describe-images \
            --repository-name ${{ secrets.ECR_REPOSITORY }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)
          echo "VERSION=${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────
      # Deploy container on EC2
      # ─────────────────────────────────────────────────
      - name: Deploy Container on EC2
        run: |
          DOCKER_IMAGE="${ECR_BASE}:${VERSION}"

          ssh -i /tmp/devops-demo-keypair.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ubuntu@${EC2_IP} \
            "
              set -e
              echo '🚀 Deploying ${DOCKER_IMAGE}'

              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
                docker login --username AWS \
                --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

              CURRENT=\$(docker inspect ${CONTAINER_NAME} \
                --format='{{.Config.Image}}' 2>/dev/null || echo 'none')
              echo \"Current version: \$CURRENT\"

              docker pull '${DOCKER_IMAGE}'

              docker stop ${CONTAINER_NAME} 2>/dev/null || true
              docker rm   ${CONTAINER_NAME} 2>/dev/null || true

              docker run -d \
                --name ${CONTAINER_NAME} \
                -p ${APP_PORT}:${CONTAINER_PORT} \
                --restart unless-stopped \
                '${DOCKER_IMAGE}'

              echo '✅ Deployment complete'
            "

      # ─────────────────────────────────────────────────
      # Health Check — retry 5 times
      # ─────────────────────────────────────────────────
      - name: Health Check
        id: health_check
        run: |
          echo "🏥 Health check on http://${EC2_IP}:${APP_PORT}"
          HEALTHY=false

          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "http://${EC2_IP}:${APP_PORT}" > /dev/null; then
              echo "✅ App healthy on attempt ${i}"
              HEALTHY=true
              break
            fi
            echo "⏳ Attempt ${i}/5 — waiting 10s..."
            sleep 10
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "❌ Health check failed — rolling back..."
            ssh -i /tmp/devops-demo-keypair.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${EC2_IP} \
              "docker stop devops-app 2>/dev/null || true; docker rm devops-app 2>/dev/null || true; echo 'Rollback complete'"
            exit 1
          fi

      # ─────────────────────────────────────────────────
      # Log Analysis — runs on EC2 via SSH
      # ─────────────────────────────────────────────────
      - name: Log Analysis
        id: log_analysis
        run: |
          mkdir -p reports

          echo "🐧 Unix runner — running log_analyzer.sh on EC2"

          scp -i /tmp/devops-demo-keypair.pem \
            -o StrictHostKeyChecking=no \
            log_analyzer.sh \
            ubuntu@${EC2_IP}:/home/ubuntu/log_analyzer.sh

          ssh -i /tmp/devops-demo-keypair.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${EC2_IP} \
            "
              chmod +x /home/ubuntu/log_analyzer.sh &&
              export CONTAINER_NAME='${CONTAINER_NAME}' &&
              export ALERT_EMAIL='${ALERT_EMAIL}' &&
              export WORKSPACE='/home/ubuntu' &&
              export BUILD_URL='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' &&
              export JOB_NAME='${{ github.workflow }}' &&
              export BUILD_NUMBER='${{ github.run_number }}' &&
              /home/ubuntu/log_analyzer.sh
            "
          LOG_EXIT=$?

          scp -i /tmp/devops-demo-keypair.pem \
            -o StrictHostKeyChecking=no \
            "ubuntu@${EC2_IP}:/home/ubuntu/reports/log_stats_*.txt" \
            reports/ 2>/dev/null || echo "No stats report to copy"

          echo "log_exit=${LOG_EXIT}" >> $GITHUB_OUTPUT

          if [ "$LOG_EXIT" = "3" ]; then
            echo "pipeline_status=failure" >> $GITHUB_OUTPUT
            echo "🔴 Critical errors — deployment blocked"
            exit 1
          elif [ "$LOG_EXIT" = "2" ]; then
            echo "pipeline_status=unstable" >> $GITHUB_OUTPUT
            echo "🟡 Warnings found"
          else
            echo "pipeline_status=success" >> $GITHUB_OUTPUT
            echo "✅ Log analysis passed"
          fi

      # ─────────────────────────────────────────────────
      # Verify Deployment
      # ─────────────────────────────────────────────────
      - name: Verify Deployment
        if: success()
        run: |
          ssh -i /tmp/devops-demo-keypair.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${EC2_IP} \
            "
              echo '── Running containers ──'
              docker ps | grep devops-app || echo '⚠️ Container not found'
              echo ''
              echo '── Last 20 log lines ──'
              docker logs devops-app --tail=20 2>&1 || true
              echo ''
              echo '── Reports directory ──'
              ls -lh /home/ubuntu/reports/ 2>/dev/null || echo 'No reports'
            "
          echo "🌐 App live at http://${EC2_IP}:${APP_PORT}"

      # ─────────────────────────────────────────────────
      # Upload Stats Report
      # ─────────────────────────────────────────────────
      - name: Upload Log Stats Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log-analysis-report
          path: reports/log_stats_*.txt
          retention-days: 14
          if-no-files-found: warn

      # ─────────────────────────────────────────────────
      # Email — SUCCESS
      # ─────────────────────────────────────────────────
      - name: Email Alert — SUCCESS
        if: success() && steps.log_analysis.outputs.pipeline_status == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.ALERT_EMAIL }}
          from:           GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          subject:        "✅ [SUCCESS] Pipeline Passed — ${{ github.workflow }} #${{ github.run_number }}"
          html_body: |
            <h2>✅ Pipeline Succeeded</h2>
            <table cellpadding="6" style="border-collapse:collapse; font-family:sans-serif;">
              <tr><td><b>Workflow</b></td><td>${{ github.workflow }}</td></tr>
              <tr><td><b>Run</b></td><td>#${{ github.run_number }}</td></tr>
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Commit</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>Container</b></td><td>devops-app</td></tr>
              <tr><td><b>App URL</b></td><td><a href="http://${{ secrets.EC2_HOST }}:8081">http://${{ secrets.EC2_HOST }}:8081</a></td></tr>
              <tr><td><b>Run URL</b></td><td><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></td></tr>
            </table>
            <p>✅ Health check passed. Log analysis passed. Deployment is live.</p>
            <p>See attached stats report for full details.</p>
          attachments: reports/log_stats_*.txt

      # ─────────────────────────────────────────────────
      # Email — UNSTABLE
      # ─────────────────────────────────────────────────
      - name: Email Alert — UNSTABLE
        if: steps.log_analysis.outputs.pipeline_status == 'unstable'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.ALERT_EMAIL }}
          from:           GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          subject:        "🟡 [WARNING] Pipeline Unstable — ${{ github.workflow }} #${{ github.run_number }}"
          html_body: |
            <h2>🟡 Pipeline Unstable — Warnings Found</h2>
            <table cellpadding="6" style="border-collapse:collapse; font-family:sans-serif;">
              <tr><td><b>Workflow</b></td><td>${{ github.workflow }}</td></tr>
              <tr><td><b>Run</b></td><td>#${{ github.run_number }}</td></tr>
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>App URL</b></td><td><a href="http://${{ secrets.EC2_HOST }}:8081">http://${{ secrets.EC2_HOST }}:8081</a></td></tr>
              <tr><td><b>Run URL</b></td><td><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></td></tr>
            </table>
            <p>🟡 Warnings exceeded threshold. Deployment allowed but review needed.</p>
            <p>See attached stats report for full details.</p>
          attachments: reports/log_stats_*.txt

      # ─────────────────────────────────────────────────
      # Email — FAILURE
      # ─────────────────────────────────────────────────
      - name: Email Alert — FAILURE
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.ALERT_EMAIL }}
          from:           GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          subject:        "🔴 [CRITICAL] Pipeline FAILED — ${{ github.workflow }} #${{ github.run_number }}"
          html_body: |
            <h2>🔴 Pipeline Failed — Deployment Blocked</h2>
            <table cellpadding="6" style="border-collapse:collapse; font-family:sans-serif;">
              <tr><td><b>Workflow</b></td><td>${{ github.workflow }}</td></tr>
              <tr><td><b>Run</b></td><td>#${{ github.run_number }}</td></tr>
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Commit</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>Run URL</b></td><td><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Failed Run</a></td></tr>
            </table>
            <p>🔴 Pipeline failed. Automatic rollback triggered on EC2.</p>
            <p>Fix errors and push to main to re-trigger.</p>
          attachments: reports/log_stats_*.txt

      # ─────────────────────────────────────────────────
      # Cleanup
      # ─────────────────────────────────────────────────
      - name: Cleanup PEM Key
        if: always()
        run: |
          rm -f /tmp/devops-demo-keypair.pem
          echo "🔑 PEM key removed"